name: Deploy Backend Postal

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_PATH: ${{ secrets.VPS_PATH }}

    steps:
      - name: Validate deploy secrets
        run: |
          set -e
          if [ -z "$VPS_HOST" ]; then echo "VPS_HOST is missing"; exit 1; fi
          if [ -z "$VPS_USER" ]; then echo "VPS_USER is missing"; exit 1; fi
          if [ -z "$VPS_SSH_KEY" ]; then echo "VPS_SSH_KEY is missing"; exit 1; fi
          if [ -z "$VPS_PORT" ]; then echo "VPS_PORT is missing"; exit 1; fi
          if [ -z "$VPS_PATH" ]; then echo "VPS_PATH is missing"; exit 1; fi

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          script: |
            set -e
            cd ${{ env.VPS_PATH }}
            git pull origin main
            npm ci
            pm2 restart backend_09_Postal --update-env