name: Deploy Backend Postal

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VPS_HOST: 14.225.254.185
      VPS_USER: root
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_PORT: 22
      VPS_PATH: /www/wwwroot/backend_09_Postal/Backend-postal

    steps:
      - name: Validate deploy secret
        run: |
          set -e
          if [ -z "$VPS_SSH_KEY" ]; then echo "VPS_SSH_KEY is missing"; exit 1; fi

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          script: |
            set -e
            cd ${{ env.VPS_PATH }}
            git pull origin main
            npm ci
            pm2 restart backend_09_Postal --update-env